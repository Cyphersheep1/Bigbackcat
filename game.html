<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Back Benny's Adventure</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { background: #000; display: block; margin: auto; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const sprites = {
            benny: '6.jpg' // Replace with correct image path of Benny's sprite.
        };
        let score = 0;
        let bellyWeight = 0;
        let speed = 2;
        let gameOver = false;

        const benny = {
            x: canvas.width / 2,
            y: canvas.height - 50,
            width: 50,
            height: 50,
        };

        function drawBenny() {
            const img = new Image();
            img.src = sprites.benny;
            img.onload = () => {
                ctx.drawImage(img, benny.x, benny.y, benny.width, benny.height);
            };
        }

        function update() {
            if (gameOver) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBenny();
            // Logic for moving, scoring, and checking for collisions.
            // Update bellyWeight and speed here.
            requestAnimationFrame(update);
        }

        function keyDownHandler(e) {
            if (gameOver) return;
            if (e.key === 'ArrowUp') { benny.y -= speed; }
            if (e.key === 'ArrowDown') { benny.y += speed; }
            if (e.key === 'ArrowLeft') { benny.x -= speed; }
            if (e.key === 'ArrowRight') { benny.x += speed; }
        }

        document.addEventListener('keydown', keyDownHandler);
        update();
    </script>
</body>
</html>
