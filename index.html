<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Big Back Benny Meme Hub</title> 
    <style> 
        body { 
            background-color: #ffcc00; /* Bright yellow background */ 
            color: #ff6600; /* Vibrant orange text */ 
            font-family: 'Comic Sans MS', cursive, sans-serif; 
            text-align: center; 
            animation: backgroundAnimation 5s infinite alternate; 
        } 
        @keyframes backgroundAnimation { 
            0% { background-color: #ffcc00; } 
            100% { background-color: #ff9900; } 
        } 
        h1 { 
            font-size: 3em; 
            margin: 20px 0; 
        } 
        .subscribe-btn { 
            background-color: #ff6600; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            font-size: 1.5em; 
            cursor: pointer; 
            margin: 20px; 
            transition: transform 0.3s; 
        } 
        .subscribe-btn:hover { 
            transform: scale(1.1); 
        } 
        .video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 20px; 
            padding: 20px; 
        } 
        .video-placeholder { 
            background-color: #ffffff; 
            border: 2px dashed #ff6600; 
            height: 150px; 
            position: relative; 
            overflow: hidden; 
            transition: transform 0.3s; 
        } 
        .video-placeholder:hover { 
            transform: scale(1.05); 
        } 
        .quote { 
            margin: 20px; 
            font-size: 1.2em; 
            cursor: pointer; 
            transition: color 0.3s; 
        } 
        .quote:hover { 
            color: #ff0000; 
        } 
    </style> 
</head> 
<body> 
    <h1>Welcome to the Big Back Benny Meme Hub!</h1> 
    <button onclick="window.open('https://www.youtube.com/@BigbackBenny', '_blank');" class="subscribe-btn">Subscribe to Big Back Benny</button> 
    <div class="video-grid"> 
        <div class="video-placeholder">YouTube Short 1</div> 
        <div class="video-placeholder">YouTube Short 2</div> 
        <div class="video-placeholder">YouTube Short 3</div> 
        <div class="video-placeholder">YouTube Short 4</div> 
    </div> 
    <div class="quote" onclick="this.innerText = 'Funny Quote Changes';">Click for Funny Quotes</div> 
</body> 
</html>
