<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>BigBack Benny: Chonky Crossing 🐱🍔</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <!-- Title Screen -->
    <div id="title-screen" class="screen">
      <div class="title-content">
        <h1 class="game-title">BigBack Benny</h1>
        <h2 class="game-subtitle">Chonky Crossing 🐱🍔</h2>
        <canvas id="title-canvas" width="180" height="180"></canvas>
        <p class="tagline">The fattest cat on the blockchain</p>
        <button id="start-btn" class="btn btn-primary">▶ Start Game</button>
        <div class="instructions">
          <p>⬆⬇⬅➡ Arrow Keys or WASD to move</p>
          <p>Mobile: Swipe or use the D-Pad</p>
        </div>
      </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover-screen" class="screen hidden">
      <div class="gameover-content">
        <canvas id="squish-canvas" width="220" height="90"></canvas>
        <h2 class="gameover-title">"I'm still hungry..."</h2>
        <div class="score-box">
          <p>Score: <span id="final-score" class="score-value">0</span></p>
          <p>Max Chonk: <span id="final-chonk" class="chonk-value">0</span></p>
          <p id="highscore-line">Best: <span id="best-score" class="score-value">0</span></p>
        </div>
        <div class="gameover-btns">
          <button id="restart-btn" class="btn btn-primary">🔄 Play Again</button>
          <button id="share-btn" class="btn btn-share">📤 Share Score</button>
        </div>
        <p id="share-notice" class="share-notice hidden">📋 Copied to clipboard!</p>
      </div>
    </div>

    <!-- Touch / D-Pad Controls -->
    <div id="touch-controls">
      <div class="dpad">
        <button class="dpad-btn dpad-up" id="btn-up">▲</button>
        <div class="dpad-row">
          <button class="dpad-btn dpad-left" id="btn-left">◀</button>
          <div class="dpad-center"></div>
          <button class="dpad-btn dpad-right" id="btn-right">▶</button>
        </div>
        <button class="dpad-btn dpad-down" id="btn-down">▼</button>
      </div>
    </div>
  </div>

  <script src="./game.js"></script>
</body>
</html>
